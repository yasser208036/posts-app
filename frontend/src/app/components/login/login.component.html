<div class="animate-fade-in max-w-md mx-auto">
  <form
    [formGroup]="form"
    (ngSubmit)="onSubmit()"
    class="rounded-2xl border border-slate-200 bg-white p-6 sm:p-8 shadow-sm"
  >
    <div class="border-b border-slate-100 pb-5 mb-6">
      <h2 class="text-xl font-bold text-slate-900">Log in</h2>
      <p class="text-xs text-slate-500 mt-1">
        Welcome back—enter your email and password.
      </p>
    </div>

    <div class="space-y-5">
      <div>
        <label
          for="email"
          class="block text-sm font-semibold text-slate-700 mb-1.5"
          >Email</label
        >
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          [class.border-red-300]="
            (email.touched && email.invalid) || serverErrors['email']
          "
          [class.focus:ring-red-200]="
            (email.touched && email.invalid) || serverErrors['email']
          "
          [class.focus:border-red-500]="
            (email.touched && email.invalid) || serverErrors['email']
          "
          class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-100 transition-all duration-200"
        />

        <div class="mt-1.5 space-y-1">
          <p
            class="text-xs text-red-600 flex items-center gap-1 font-medium"
            *ngIf="email.touched && email.hasError('required')"
          >
            Email is required.
          </p>
          <p
            class="text-xs text-red-600 flex items-center gap-1 font-medium"
            *ngIf="email.touched && email.hasError('email')"
          >
            Enter a valid email.
          </p>
          <p
            class="text-xs text-red-600 flex items-center gap-1 font-medium"
            *ngIf="serverErrors['email']"
          >
            {{ serverErrors["email"] }}
          </p>
        </div>
      </div>

      <div>
        <label
          for="password"
          class="block text-sm font-semibold text-slate-700 mb-1.5"
          >Password</label
        >
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="••••••••"
          [class.border-red-300]="
            (password.touched && password.invalid) || serverErrors['password']
          "
          [class.focus:ring-red-200]="
            (password.touched && password.invalid) || serverErrors['password']
          "
          [class.focus:border-red-500]="
            (password.touched && password.invalid) || serverErrors['password']
          "
          class="block w-full rounded-xl border border-slate-200 bg-slate-50/50 px-4 py-2.5 text-sm text-slate-900 placeholder:text-slate-400 focus:border-indigo-500 focus:bg-white focus:outline-none focus:ring-4 focus:ring-indigo-100 transition-all duration-200"
        />

        <div class="mt-1.5 space-y-1">
          <p
            class="text-xs text-red-600 flex items-center gap-1 font-medium"
            *ngIf="password.touched && password.hasError('required')"
          >
            Password is required.
          </p>
          <p
            class="text-xs text-red-600 flex items-center gap-1 font-medium"
            *ngIf="serverErrors['password']"
          >
            {{ serverErrors["password"] }}
          </p>
        </div>
      </div>
    </div>

    <div
      *ngIf="errorMessage"
      class="mt-5 rounded-xl border border-red-100 bg-red-50 p-4 text-red-800 flex items-center gap-2"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="2"
        stroke="currentColor"
        class="h-5 w-5 text-red-600 shrink-0"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z"
        />
      </svg>
      <span class="text-sm font-medium">{{ errorMessage }}</span>
    </div>

    <div
      class="mt-8 flex flex-col sm:flex-row items-center justify-end gap-3 border-t border-slate-100 pt-6"
    >
      <button
        type="button"
        (click)="navigateToSignup()"
        class="w-full sm:w-auto text-center rounded-xl border border-slate-200 bg-white px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50 hover:text-slate-900 transition-colors focus-visible:outline-2 focus-visible:outline-indigo-600"
      >
        Sign up
      </button>

      <button
        type="submit"
        [disabled]="submitting || form.invalid"
        class="w-full sm:w-auto inline-flex items-center justify-center gap-2 rounded-xl bg-indigo-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm shadow-indigo-100 hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none"
      >
        <span>{{ submitting ? "Signing in..." : "Log in" }}</span>
      </button>
    </div>

    <div class="mt-6">
      <div id="googleBtn"></div>
    </div>
  </form>
</div>
