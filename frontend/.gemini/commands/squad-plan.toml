description = "Generate an implementation plan from a squad-kit story intake file."

prompt = """
Generate an implementation plan using the squad-kit workflow.

Steps:
1. Read generate-plan.md from the installed squad-kit package (templates/prompts/; not under .squad/) and follow its instructions exactly.
2. Read the intake file at the argument path (under .squad/stories/) plus any referenced files in its attachments/.
3. Read .squad/config.yaml for tracker type and naming rules.
4. Scan .squad/plans/**/NN-story-*.md to determine the next global sequence number.
5. Write the plan file to .squad/plans/<feature-slug>/NN-story-<slug>[-<id>].md and update 00-overview.md / 00-index.md as needed.

Planning only. Do not modify application source code in this session.

If a plan file already starts with `<!-- squad-kit:`, never change or remove that first line when editing (tooling). New plans start with `# Story NN — …` per generate-plan.md; do not fake the API metadata comment. In later implementation sessions, keep the plan file read-only unless the user explicitly asks to revise the plan.
"""
