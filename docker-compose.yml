# Local dev only. Credentials are hardcoded and insecure — do not use this
# compose file for anything deployed or shared.
services:
  postgres:
    image: postgres:16-alpine
    container_name: posts-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: posts_app
    ports:
      - "5432:5432"
    volumes:
      - posts-app-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posts_app"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  posts-app-pgdata:
